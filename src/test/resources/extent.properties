# ExtentReports Spark Reporter Configuration
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/extent-report.html

# Configuration File for XML Customizations (Theme, Titles)
extent.reporter.spark.config=src/test/resources/extent-config.xml

# Capture and embed screenshots directly as inline base64 strings
extent.reporter.spark.base64imagesrc=true
