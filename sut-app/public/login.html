<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Pharma Company - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #f59e0b;
            --accent-hover: #d97706;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --error-color: #f87171;
            --success-color: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient floating stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            position: relative;
            transform: translateY(0);
            transition: all 0.3s ease;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .logo-icon {
            font-size: 28px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-color);
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .toggle-password:hover {
            color: var(--text-color);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message-box {
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-box.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error-color);
            color: var(--error-color);
            display: block;
        }

        .message-box.success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid var(--success-color);
            color: var(--success-color);
            display: block;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-note span {
            color: var(--accent-color);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="login-container">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🧬</span>
                Dummy Pharma <span>Company</span>
            </div>
            <p class="subtitle">Security Gateway & Lab Database</p>
        </div>

        <div id="messageBox" class="message-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Employee Email</label>
                <div class="input-wrapper">
                    <input type="text" id="email" placeholder="pharmacist@pharmasynth.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="togglePassword">Show</button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">LOG IN</button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const messageBox = document.getElementById('messageBox');
        const loginBtn = document.getElementById('loginBtn');

        // Toggle Password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? 'Show' : 'Hide';
        });

        // Form Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear message
            messageBox.style.display = 'none';
            messageBox.className = 'message-box';
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            loginBtn.textContent = 'LOGGING IN...';
            loginBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    messageBox.textContent = 'Login successful! Redirecting...';
                    messageBox.classList.add('success');
                    messageBox.style.display = 'block';

                    // Save token in localStorage
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_email', data.user.email);
                    localStorage.setItem('user_name', data.user.name);

                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                } else {
                    messageBox.textContent = data.error || 'Login failed.';
                    messageBox.classList.add('error');
                    messageBox.style.display = 'block';
                    loginBtn.textContent = 'LOG IN';
                    loginBtn.disabled = false;
                }
            } catch (err) {
                messageBox.textContent = 'Network error. Please try again.';
                messageBox.classList.add('error');
                messageBox.style.display = 'block';
                loginBtn.textContent = 'LOG IN';
                loginBtn.disabled = false;
            }
        });

        // Auto redirect if already logged in
        window.addEventListener('load', () => {
            if (localStorage.getItem('auth_token') === 'mock-jwt-token-12345') {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
